<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JBrealty CRM</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 12px; width: 320px; }
      label { display: block; font-size: 12px; color: #64748b; margin-bottom: 4px; }
      input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; }
      button { width: 100%; padding: 10px; border: 0; border-radius: 8px; background: #0d9488; color: #fff; font-weight: 600; cursor: pointer; }
      button.secondary { background: #f1f5f9; color: #334155; margin-top: 8px; }
      #status { font-size: 12px; color: #64748b; margin-top: 8px; min-height: 1.2em; }
      a { color: #0d9488; font-size: 12px; }
    </style>
  </head>
  <body>
    <label for="origin">Адрес CRM</label>
    <input id="origin" type="url" placeholder="https://crm.example.ru" />
    <button id="openCrm" type="button">Открыть CRM</button>
    <button id="check" type="button" class="secondary">Проверить API</button>
    <p id="status"></p>
    <p><a id="crmLink" href="#" target="_blank" rel="noreferrer">Войти в CRM →</a></p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
